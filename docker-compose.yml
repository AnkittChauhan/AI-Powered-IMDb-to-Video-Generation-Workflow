"""
Docker Compose configuration for full stack
"""
version: '3.8'

services:
  # ============================================
  # Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: imdb_video_postgres
    environment:
      POSTGRES_DB: imdb_video
      POSTGRES_USER: imdb_user
      POSTGRES_PASSWORD: imdb_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imdb_user"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - imdb_network

  # ============================================
  # Redis (Message Broker)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: imdb_video_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - imdb_network

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imdb_video_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://imdb_user:imdb_password@postgres:5432/imdb_video
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - /tmp/imdb_video_storage:/tmp/imdb_video_storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imdb_network

  # ============================================
  # Celery Worker
  # ============================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imdb_video_celery_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://imdb_user:imdb_password@postgres:5432/imdb_video
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - /tmp/imdb_video_storage:/tmp/imdb_video_storage
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - imdb_network

  # ============================================
  # Celery Flower (Monitoring)
  # ============================================
  flower:
    image: mher/flower:2.0
    container_name: imdb_video_flower
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker
    networks:
      - imdb_network

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: imdb_video_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - imdb_network

# ============================================
# Networks
# ============================================
networks:
  imdb_network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:
