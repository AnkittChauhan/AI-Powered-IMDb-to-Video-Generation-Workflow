services:
  # ============================================
  # Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: imdb_video_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imdb_video}
      POSTGRES_USER: ${POSTGRES_USER:-imdb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imdb_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-imdb_user}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - imdb_network

  # ============================================
  # Redis (Message Broker)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: imdb_video_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - imdb_network

  # ============================================
  # Local TTS (Kokoro FastAPI)
  # ============================================
  kokoro_tts:
    image: ${KOKORO_IMAGE:-ghcr.io/remsky/kokoro-fastapi-cpu:v0.3.0}
    container_name: imdb_video_kokoro_tts
    ports:
      - "8880:8880"
    environment:
      - HOST=0.0.0.0
      - PORT=8880
      - API_LOG_LEVEL=${KOKORO_API_LOG_LEVEL:-INFO}
      - DEFAULT_VOICE=${KOKORO_TTS_VOICE:-af_sky}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8880/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - imdb_network

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imdb_video_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-imdb_user}:${POSTGRES_PASSWORD:-imdb_password}@postgres:5432/${POSTGRES_DB:-imdb_video}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - OPENAI_TTS_VOICE=${OPENAI_TTS_VOICE:-alloy}
      - TTS_PROVIDER=${TTS_PROVIDER:-kokoro}
      - TTS_MAX_CHARACTERS=${TTS_MAX_CHARACTERS:-2000}
      - KOKORO_TTS_BASE_URL=${KOKORO_TTS_BASE_URL:-http://kokoro_tts:8880/v1}
      - KOKORO_TTS_API_KEY=${KOKORO_TTS_API_KEY:-not-needed}
      - KOKORO_TTS_MODEL=${KOKORO_TTS_MODEL:-kokoro}
      - KOKORO_TTS_VOICE=${KOKORO_TTS_VOICE:-af_sky}
      - KOKORO_TTS_FORMAT=${KOKORO_TTS_FORMAT:-mp3}
      - KOKORO_TTS_SPEED=${KOKORO_TTS_SPEED:-1.0}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen3-coder:free}
      - LOCAL_STORAGE_PATH=/tmp/imdb_video_storage
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - /tmp/imdb_video_storage:/tmp/imdb_video_storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kokoro_tts:
        condition: service_healthy
    networks:
      - imdb_network

  # ============================================
  # Celery Worker
  # ============================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imdb_video_celery_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-imdb_user}:${POSTGRES_PASSWORD:-imdb_password}@postgres:5432/${POSTGRES_DB:-imdb_video}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - OPENAI_TTS_VOICE=${OPENAI_TTS_VOICE:-alloy}
      - TTS_PROVIDER=${TTS_PROVIDER:-kokoro}
      - TTS_MAX_CHARACTERS=${TTS_MAX_CHARACTERS:-2000}
      - KOKORO_TTS_BASE_URL=${KOKORO_TTS_BASE_URL:-http://kokoro_tts:8880/v1}
      - KOKORO_TTS_API_KEY=${KOKORO_TTS_API_KEY:-not-needed}
      - KOKORO_TTS_MODEL=${KOKORO_TTS_MODEL:-kokoro}
      - KOKORO_TTS_VOICE=${KOKORO_TTS_VOICE:-af_sky}
      - KOKORO_TTS_FORMAT=${KOKORO_TTS_FORMAT:-mp3}
      - KOKORO_TTS_SPEED=${KOKORO_TTS_SPEED:-1.0}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen3-coder:free}
      - LOCAL_STORAGE_PATH=/tmp/imdb_video_storage
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - /tmp/imdb_video_storage:/tmp/imdb_video_storage
    depends_on:
      - postgres
      - redis
      - kokoro_tts
      - backend
    networks:
      - imdb_network

  # ============================================
  # Celery Flower (Monitoring)
  # ============================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imdb_video_flower
    command: celery -A app.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-imdb_user}:${POSTGRES_PASSWORD:-imdb_password}@postgres:5432/${POSTGRES_DB:-imdb_video}
    depends_on:
      - redis
      - celery_worker
    networks:
      - imdb_network

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: imdb_video_frontend
    command: npm run dev -- --hostname 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - imdb_network

# ============================================
# Networks
# ============================================
networks:
  imdb_network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:
